<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#030810">
    <title>🤝 MEETING SYNC — Timezone Coordinator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #030810;
            --bg-deep: #060d18;
            --bg-primary: #0a1420;
            --bg-card: #0e1c2e;
            --bg-elevated: #122038;
            --bg-input: #0a1420;
            --bg-hover: #162844;
            --cyan-glow: #00e5ff;
            --cyan-bright: #4df0ff;
            --cyan-dim: #007a8a;
            --cyan-muted: #004a55;
            --cyan-subtle: rgba(0,229,255,0.07);
            --amber-glow: #ffab00;
            --amber-bright: #ffc040;
            --amber-dim: #8a5a00;
            --amber-soft: #cc8800;
            --green-glow: #00ff9d;
            --green-dim: #00a060;
            --text-primary: #d8e8f8;
            --text-secondary: #6a8aaa;
            --text-dim: #3a5068;
            --text-bright: #f0f8ff;
            --border-default: rgba(0, 180, 220, 0.15);
            --border-active: rgba(0, 229, 255, 0.45);
            --scanline-opacity: 0.025;
            --grid-opacity: 0.018;
        }
        :root.day-mode {
            --bg-void: #f4efe6;
            --bg-deep: #faf6ef;
            --bg-primary: #faf7f0;
            --bg-card: #ffffff;
            --bg-elevated: #f5f0e8;
            --bg-input: #f0ebe0;
            --bg-hover: #eae4d8;
            --cyan-glow: #b85000;
            --cyan-bright: #d46010;
            --cyan-dim: #d4a070;
            --cyan-muted: #d4b098;
            --cyan-subtle: rgba(184,80,0,0.07);
            --amber-glow: #a04c00;
            --amber-bright: #c45c00;
            --amber-dim: #8a5a00;
            --amber-soft: #c87010;
            --green-glow: #1a7a3a;
            --green-dim: #2a8a5a;
            --text-primary: #1a1a2e;
            --text-secondary: #5a6070;
            --text-dim: #9a9aaa;
            --text-bright: #0a0a18;
            --border-default: rgba(0,0,0,0.1);
            --border-active: rgba(184,80,0,0.4);
            --scanline-opacity: 0;
            --grid-opacity: 0.025;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-void);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0, 229, 255, var(--grid-opacity)) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, var(--grid-opacity)) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
            transition: opacity 0.6s;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,var(--scanline-opacity)) 3px, rgba(0,0,0,var(--scanline-opacity)) 4px);
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.6s;
        }
        .vignette {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% 0%, transparent 40%, rgba(0,0,0,0.35) 100%);
            pointer-events: none;
            z-index: 1;
            transition: opacity 0.6s;
        }
        :root.day-mode .vignette { opacity: 0; }
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(6, 13, 24, 0.9);
            border-bottom: 1px solid var(--border-default);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            transition: background 0.6s, border-color 0.6s;
        }
        :root.day-mode .top-bar { background: rgba(250,246,240,0.92); }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 30px; height: 30px; }
        .logo-icon svg { width: 100%; height: 100%; }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-secondary);
            line-height: 1.2;
            transition: color 0.6s;
        }
        .logo-text span { display: block; color: var(--cyan-glow); font-size: 8px; letter-spacing: 4px; margin-top: 1px; }
        .lang-switcher { display: flex; gap: 2px; background: var(--bg-input); padding: 3px; border-radius: 8px; border: 1px solid var(--border-default); }
        .lang-btn {
            padding: 5px 11px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.25s;
            letter-spacing: 0.5px;
        }
        .lang-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
        .lang-btn.active {
            background: var(--cyan-glow);
            color: var(--bg-void);
            font-weight: 700;
            box-shadow: 0 0 16px rgba(0, 229, 255, 0.35), 0 2px 8px rgba(0,0,0,0.3);
        }
        :root.day-mode .lang-btn.active { box-shadow: 0 2px 12px rgba(184,80,0,0.25); }
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-default);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
        }
        .theme-toggle:hover { border-color: var(--cyan-glow); color: var(--text-primary); }
        .theme-icon { width: 16px; height: 16px; transition: transform 0.4s; }
        .container { max-width: 560px; margin: 0 auto; padding: 0 12px 32px; position: relative; z-index: 2; }
        .hero-header { text-align: center; padding: 28px 0 20px; }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            background: rgba(0, 229, 255, 0.07);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--cyan-glow);
            margin-bottom: 14px;
            transition: all 0.6s;
        }
        .hero-badge-dot {
            width: 5px;
            height: 5px;
            background: var(--green-glow);
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
            box-shadow: 0 0 6px var(--green-glow);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text-bright);
            margin-bottom: 6px;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.15);
            transition: color 0.6s, text-shadow 0.6s;
        }
        .hero-subtitle {
            font-size: 10px;
            letter-spacing: 5px;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 12px;
            transition: color 0.6s;
        }
        .utc-strip { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .utc-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); transition: color 0.6s; }
        .utc-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--green-glow);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--green-glow);
            transition: color 0.6s, text-shadow 0.6s;
        }
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.6s;
            position: relative;
        }
        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan-glow), transparent);
            opacity: 0.4;
            transition: opacity 0.6s;
        }
        .panel-header {
            background: var(--bg-elevated);
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-default);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.6s, border-color 0.6s;
        }
        .panel-led {
            width: 8px;
            height: 8px;
            background: var(--cyan-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--cyan-glow), 0 0 20px rgba(0, 229, 255, 0.3);
            flex-shrink: 0;
            transition: all 0.6s;
        }
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--cyan-glow);
            transition: color 0.6s;
        }
        .panel-content { padding: 14px 16px; }
        .time-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .selector-group { display: flex; flex-direction: column; gap: 4px; }
        .selector-group.full-width { grid-column: span 3; }
        .selector-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            padding-left: 2px;
            transition: color 0.6s;
        }
        select {
            padding: 10px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-default);
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            text-align: center;
            transition: all 0.25s;
            width: 100%;
        }
        select:focus { outline: none; border-color: var(--cyan-glow); box-shadow: 0 0 0 3px rgba(0,229,255,0.12), 0 0 20px rgba(0,229,255,0.08); }
        :root.day-mode select:focus { box-shadow: 0 0 0 3px rgba(184,80,0,0.1); }
        select option { background: var(--bg-card); color: var(--text-primary); }
        select.tz-select { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.3px; text-align: left; padding: 8px 10px; }
        .preset-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card));
            border: 1px solid var(--border-default);
            border-radius: 8px;
            color: var(--cyan-glow);
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }
        .preset-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,229,255,0.08), transparent);
            transition: left 0.5s;
        }
        .preset-btn:hover { border-color: var(--cyan-glow); box-shadow: 0 0 24px rgba(0,229,255,0.15), inset 0 0 20px rgba(0,229,255,0.04); }
        .preset-btn:hover::before { left: 100%; }
        :root.day-mode .preset-btn:hover { border-color: var(--amber-glow); box-shadow: 0 2px 16px rgba(184,80,0,0.15); }
        .base-tz-row { display: flex; align-items: center; gap: 10px; padding-top: 10px; border-top: 1px solid var(--border-default); margin-top: 2px; }
        .base-tz-label { font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); white-space: nowrap; transition: color 0.6s; }
        .base-tz-row select { flex: 1; padding: 8px 10px; font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif; border-radius: 6px; text-align: left; }
        .tz-cards { display: flex; flex-direction: column; gap: 8px; }
        .tz-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .tz-card::after {
            content: '';
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--cyan-glow);
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 0 10px 10px 0;
        }
        .tz-card:hover { border-color: var(--border-active); transform: translateX(3px); box-shadow: -4px 0 20px rgba(0,229,255,0.08); }
        .tz-card:hover::after { opacity: 1; }
        :root.day-mode .tz-card:hover { transform: translateX(2px); box-shadow: 0 2px 14px rgba(0,0,0,0.07); }
        .tz-card-top { display: flex; align-items: stretch; background: var(--bg-deep); border-bottom: 1px solid var(--border-default); transition: background 0.6s, border-color 0.6s; }
        .tz-slot-num {
            width: 36px;
            min-width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(0,229,255,0.1), rgba(0,229,255,0.03));
            border-right: 1px solid var(--border-default);
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 900;
            color: var(--cyan-glow);
            text-shadow: 0 0 10px var(--cyan-glow);
            letter-spacing: 1px;
            transition: all 0.6s;
        }
        :root.day-mode .tz-slot-num { background: linear-gradient(180deg, rgba(184,80,0,0.08), rgba(184,80,0,0.02)); color: var(--amber-glow); text-shadow: none; }
        .tz-loc-select { flex: 1; display: flex; align-items: center; padding: 0 10px; }
        .tz-loc-select select { width: 100%; padding: 7px 10px; font-size: 11px; background: transparent; border: none; border-bottom: 1px solid transparent; border-radius: 0; text-align: left; font-weight: 600; }
        .tz-loc-select select:focus { border-bottom-color: var(--cyan-glow); box-shadow: none; }
        .tz-offset-badge { padding: 6px 12px; font-size: 9px; font-weight: 700; color: var(--text-dim); display: flex; align-items: center; letter-spacing: 1px; border-left: 1px solid var(--border-default); white-space: nowrap; transition: color 0.6s, border-color 0.6s; }
        .tz-card-body { display: flex; align-items: center; padding: 12px 14px; background: linear-gradient(180deg, var(--bg-card), var(--bg-elevated)); transition: background 0.6s; gap: 12px; }
        .tz-time-block { flex: 1; }
        .tz-time {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            color: var(--amber-bright);
            text-shadow: 0 0 16px var(--amber-glow), 0 0 32px rgba(255,171,0,0.25);
            letter-spacing: 3px;
            line-height: 1;
            transition: color 0.6s, text-shadow 0.6s;
        }
        :root.day-mode .tz-time { color: var(--amber-soft); text-shadow: none; }
        .tz-date-row { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .tz-date { font-size: 11px; font-weight: 600; color: var(--text-secondary); transition: color 0.6s; }
        .tz-day { font-size: 10px; font-weight: 700; color: var(--green-glow); letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.6s; }
        .status-bar { margin-top: 12px; padding: 10px 16px; background: var(--bg-deep); border: 1px solid var(--border-default); border-radius: 10px; display: flex; justify-content: space-between; align-items: center; transition: all 0.6s; }
        .status-item { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); font-weight: 500; transition: color 0.6s; }
        .status-item .val { color: var(--green-glow); font-weight: 700; transition: color 0.6s; }
        .status-divider { width: 1px; height: 16px; background: var(--border-default); }
        .footer { margin-top: 28px; padding: 20px 0 8px; text-align: center; border-top: 1px solid var(--border-default); transition: border-color 0.6s; }
        .footer-by { font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; transition: color 0.6s; }
        .footer-tagline { font-size: 9px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; opacity: 0.6; transition: color 0.6s; }
        .install-hint { text-align: center; font-size: 9px; color: var(--text-dim); margin-top: 16px; padding: 10px; background: var(--cyan-subtle); border: 1px dashed var(--border-default); border-radius: 6px; letter-spacing: 1px; transition: all 0.6s; }
        @media (max-width: 400px) {
            .hero-title { font-size: 14px; letter-spacing: 4px; }
            .hero-badge { font-size: 8px; padding: 4px 10px; }
            .tz-time { font-size: 22px; }
            .top-bar { padding: 8px 12px; }
            .container { padding: 0 8px 20px; }
            select { font-size: 18px; }
            select.tz-select { font-size: 11px; }
        }
        @media (min-width: 500px) {
            .container { padding: 0 20px 32px; }
            .hero-title { font-size: 20px; letter-spacing: 8px; }
            .tz-time { font-size: 30px; }
            select { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <div class="top-bar">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="1" width="30" height="30" rx="7" fill="var(--bg-input)" stroke="var(--border-default)" stroke-width="1"/>
                    <circle cx="16" cy="16" r="9" stroke="var(--cyan-dim)" stroke-width="1.5" opacity="0.5"/>
                    <circle cx="16" cy="16" r="5" stroke="var(--cyan-glow)" stroke-width="1.5" opacity="0.7"/>
                    <circle cx="16" cy="16" r="2" fill="var(--cyan-glow)"/>
                    <line x1="16" y1="4" x2="16" y2="7" stroke="var(--text-dim)" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="16" y1="25" x2="16" y2="28" stroke="var(--text-dim)" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="4" y1="16" x2="7" y2="16" stroke="var(--text-dim)" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="25" y1="16" x2="28" y2="16" stroke="var(--text-dim)" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="24" cy="8" r="1.5" fill="var(--amber-glow)" opacity="0.8"/>
                </svg>
            </div>
            <div class="logo-text">MEETING<span>SYNC</span></div>
        </div>
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="zh">中文</button>
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="pt">PT</button>
        </div>
        <div class="theme-toggle" id="themeToggle">
            <svg class="theme-icon" id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <span id="themeLabel">AUTO</span>
        </div>
    </div>
    <div class="container">
        <div class="hero-header">
            <div class="hero-badge">
                <div class="hero-badge-dot"></div>
                <span id="heroBadge">实时协调</span>
            </div>
            <h1 class="hero-title" id="heroTitle">Meeting Sync</h1>
            <div class="hero-subtitle" id="heroSubtitle">Timezone Coordinator</div>
            <div class="utc-strip">
                <span class="utc-label" id="utcLbl">UTC</span>
                <span class="utc-value" id="utcValue">--:--</span>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">
                <div class="panel-led"></div>
                <span class="panel-title" id="panelBaseTitle">Base Time · 基准时间</span>
            </div>
            <div class="panel-content">
                <div class="time-grid">
                    <div class="selector-group">
                        <label class="selector-label" id="lblYear">Year 年</label>
                        <select id="year"></select>
                    </div>
                    <div class="selector-group">
                        <label class="selector-label" id="lblMonth">Month 月</label>
                        <select id="month"></select>
                    </div>
                    <div class="selector-group">
                        <label class="selector-label" id="lblDay">Day 日</label>
                        <select id="day"></select>
                    </div>
                    <div class="selector-group">
                        <label class="selector-label" id="lblHour">Hour 时</label>
                        <select id="hour"></select>
                    </div>
                    <div class="selector-group">

        </footer>
        <div class="install-hint" id="installHint" style="display:none">↑ Safari Share → Add to Home Screen</div>
    </div>
    <script>
        // ALL original JS PRESERVED EXACTLY
        const translations = {

                statusOnline: 'Online', utc: 'UTC', footerTagline: 'Precision Time Coordination · 精准时间协调', heroBadge: '实时协调', heroSubtitle: 'Timezone Coordinator'
            },

                statusOnline: 'Online', utc: 'UTC', footerTagline: 'Precision Time Coordination', heroBadge: 'Live Coordination', heroSubtitle: 'Timezone Coordinator'
            },

                lblBaseTz: 'Zona Horaria', presetBtn: 'Cargar Rutas Predefinidas', statusSystemLabel: 'Sistema', statusVersionLabel: 'Versión',
                statusOnline: 'En línea', utc: 'UTC', footerTagline: 'Coordinación de Tiempo de Precisión', heroBadge: 'Coordinación en Vivo', heroSubtitle: 'Coordinador de Zonas Horarias'
            },
            pt: {
                headerTitle: 'Sincronizar Reunião', headerSubtitle: 'Coordenador de Fusos Horários', panelBaseTitle: 'Hora Base', panelDestTitle: 'Horários de Destino',
                lblYear: 'Ano', lblMonth: 'Mês', lblDay: 'Dia', lblHour: 'Hora', lblMinute: 'Min', lblSecond: 'Seg',
                lblBaseTz: 'Fuso Horário', presetBtn: 'Carregar Rotas Predefinidas', statusSystemLabel: 'Sistema', statusVersionLabel: 'Versão',
                statusOnline: 'Online', utc: 'UTC', footerTagline: 'Coordenação de Tempo de Precisão', heroBadge: 'Coordenação ao Vivo', heroSubtitle: 'Coordenador de Fusos Horários'

        };

        const locationNames = {
            zh: {
                'Asia/Shanghai': '中国 · 北京',
                'America/Los_Angeles': '美国 · 洛杉矶',
                'America/Chicago_Houston': '美国 · 休斯顿',
                'America/Chicago_Rockford': '美国 · 罗克福德',
                'America/Monterrey': '墨西哥 · 蒙特雷',
                'America/Sao_Paulo': '巴西 · 圣保罗',
                'Europe/Madrid': '西班牙 · 马德里',
                'Europe/London': '英国 · 加的夫'
            },
            en: {
                'Asia/Shanghai': 'China · Beijing',
                'America/Los_Angeles': 'USA · Los Angeles',
                'America/Chicago_Houston': 'USA · Houston',
                'America/Chicago_Rockford': 'USA · Rockford',
                'America/Monterrey': 'Mexico · Monterrey',
                'America/Sao_Paulo': 'Brazil · São Paulo',
                'Europe/Madrid': 'Spain · Madrid',
                'Europe/London': 'UK · Cardiff'
            },
            es: {

                'America/Los_Angeles': 'EEUU · Los Ángeles',
                'America/Chicago_Houston': 'EEUU · Houston',
                'America/Chicago_Rockford': 'EEUU · Rockford',
                'America/Monterrey': 'México · Monterrey',
                'America/Sao_Paulo': 'Brasil · São Paulo',
                'Europe/Madrid': 'España · Madrid',
                'Europe/London': 'Reino Unido · Cardiff'
            },
            pt: {
                'Asia/Shanghai': 'China · Pequim',
                'America/Los_Angeles': 'EUA · Los Angeles',
                'America/Chicago_Houston': 'EUA · Houston',
                'America/Chicago_Rockford': 'EUA · Rockford',
                'America/Monterrey': 'México · Monterrey',
                'America/Sao_Paulo': 'Brasil · São Paulo',
                'Europe/Madrid': 'Espanha · Madri',
                'Europe/London': 'Reino Unido · Cardiff'
            }
        };

        const allLocations = [
            { id: 'Asia/Shanghai', tz: 'Asia/Shanghai' },
            { id: 'America/Los_Angeles', tz: 'America/Los_Angeles' },
            { id: 'America/Chicago_Houston', tz: 'America/Chicago' },
            { id: 'America/Chicago_Rockford', tz: 'America/Chicago' },
            { id: 'America/Monterrey', tz: 'America/Monterrey' },
            { id: 'America/Sao_Paulo', tz: 'America/Sao_Paulo' },
            { id: 'Europe/Madrid', tz: 'Europe/Madrid' },
            { id: 'Europe/London', tz: 'Europe/London' }
        ];

        const defaultDestinations = [
            'Asia/Shanghai',
            'America/Los_Angeles',
            'America/Chicago_Houston',
            'America/Chicago_Rockford',
            'America/Monterrey',
            'Europe/Madrid',
            'Europe/London',
            'America/Sao_Paulo'
        ];

        let currentLang = 'zh';
        let manualTheme = null;

        function getAutoTheme() {
            const hour = new Date().getHours();
            return (hour >= 6 && hour < 18) ? 'day' : 'night';
        }

        function applyTheme(theme) {
            if (theme === 'day') {
                document.documentElement.classList.add('day-mode');
            } else {
                document.documentElement.classList.remove('day-mode');
            }
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const theme = manualTheme || getAutoTheme();
            if (theme === 'day') {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
                label.textContent = 'DAY';
            } else {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
                label.textContent = 'NIGHT';
            }
        }

        function toggleTheme() {
            const currentTheme = manualTheme || getAutoTheme();
            manualTheme = currentTheme === 'night' ? 'day' : 'night';
            applyTheme(manualTheme);
            updateThemeIcon();
        }

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('heroTitle').textContent = t.headerTitle;
            document.getElementById('heroSubtitle').textContent = t.headerSubtitle;
            document.getElementById('heroBadge').textContent = t.heroBadge;
            document.getElementById('panelBaseTitle').textContent = t.panelBaseTitle;
            document.getElementById('panelDestTitle').textContent = t.panelDestTitle;
            document.getElementById('lblYear').textContent = t.lblYear;
            document.getElementById('lblMonth').textContent = t.lblMonth;
            document.getElementById('lblDay').textContent = t.lblDay;
            document.getElementById('lblHour').textContent = t.lblHour;
            document.getElementById('lblMinute').textContent = t.lblMinute;
            document.getElementById('lblSecond').textContent = t.lblSecond;
            document.getElementById('lblBaseTz').textContent = t.lblBaseTz;
            document.getElementById('presetBtn').textContent = t.presetBtn;
            document.getElementById('statusSystemLabel').textContent = t.statusSystemLabel;
            document.getElementById('statusOnline').textContent = t.statusOnline;
            document.getElementById('statusVersionLabel').textContent = t.statusVersionLabel;
            document.getElementById('utcLbl').textContent = t.utc;
            document.getElementById('footerTagline').textContent = t.footerTagline;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
            updateBaseTimezoneSelector();
            updateTimezoneCards();
        }

        function getTimezoneOffset(timezone, date) {
            try {
                date = date || new Date();
                const str = date.toLocaleString('en-US', { timeZone: timezone, hour12: false });
                const localStr = date.toLocaleString('en-US', { timeZone: 'UTC', hour12: false });
                const tzDate = new Date(str);
                const utcDate = new Date(localStr);
                const offsetMs = tzDate - utcDate;
                return offsetMs / (1000 * 60 * 60);
            } catch (e) { return 0; }
        }

        function formatTimezoneOffset(offset) {
            const sign = offset >= 0 ? '+' : '';
            return 'UTC' + sign + offset;
        }

        function initBaseTimezoneSelector() {
            const tzSelect = document.getElementById('baseTimezone');
            tzSelect.innerHTML = '';
            allLocations.forEach(loc => {
                const opt = document.createElement('option');
                opt.value = loc.tz;
                opt.textContent = locationNames[currentLang][loc.id] || loc.id;
                tzSelect.appendChild(opt);
            });
            tzSelect.value = 'Asia/Shanghai';
        }

        function updateBaseTimezoneSelector() {
            const tzSelect = document.getElementById('baseTimezone');
            const opts = tzSelect.options;
            allLocations.forEach((loc, i) => {
                if (opts[i]) opts[i].textContent = locationNames[currentLang][loc.id] || loc.id;
            });
        }

        function initTimezoneCards() {
            const container = document.getElementById('timeZones');
            container.innerHTML = '';
            // 5 slots
            for (let i = 0; i < 5; i++) {
                const card = document.createElement('div');
                card.className = 'tz-card';
                card.innerHTML =
                    '<div class="tz-card-top">' +
                        '<div class="tz-slot-num">' + String(i + 1).padStart(2, '0') + '</div>' +
                        '<div class="tz-loc-select"><select class="tz-select" data-index="' + i + '"></select></div>' +
                        '<div class="tz-offset-badge" data-offset="' + i + '">--</div>' +
                    '</div>' +
                    '<div class="tz-card-body">' +
                        '<div class="tz-time-block">' +
                            '<div class="tz-time" data-time="' + i + '">--:--</div>' +
                            '<div class="tz-date-row">' +
                                '<span class="tz-date" data-date="' + i + '">--/--</span>' +
                                '<span class="tz-day" data-day="' + i + '">---</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                container.appendChild(card);
            }
            const selects = container.querySelectorAll('.tz-select');
            allLocations.forEach(loc => {
                selects.forEach(select => {
                    const opt = document.createElement('option');
                    opt.value = loc.id;
                    opt.textContent = locationNames[currentLang][loc.id] || loc.id;
                    select.appendChild(opt.cloneNode(true));
                });
            });
            selects.forEach(select => select.addEventListener('change', updateAll));
            loadPresets();
        }

        function loadPresets() {
            const selects = document.querySelectorAll('.tz-select');
            // Map 5 slots to 5 of 8: Beijing, LA, Houston, Madrid, São Paulo
            const preset5 = [
                'Asia/Shanghai',
                'America/Los_Angeles',
                'America/Chicago_Houston',
                'Europe/Madrid',
                'America/Sao_Paulo'
            ];
            selects.forEach((select, i) => {
                if (preset5[i]) select.value = preset5[i];
            });
            updateAll();
        }

        function updateTime() {
            updateAll();
        }

        function updateAll() {
            const year = parseInt(document.getElementById('year').value);
            const month = parseInt(document.getElementById('month').value);
            const day = parseInt(document.getElementById('day').value);
            const hour = parseInt(document.getElementById('hour').value);
            const minute = parseInt(document.getElementById('minute').value);
            const second = parseInt(document.getElementById('second').value);
            const baseTz = document.getElementById('baseTimezone').value;

            const userDate = new Date(year, month - 1, day, hour, minute, second || 0);
            // Selector values are in baseTz timezone, NOT Mac's local timezone
            // Use Date.UTC to construct UTC time from selector values
            // Then subtract offset to get UTC
            const baseOffset = getTimezoneOffset(baseTz, new Date(Date.UTC(year, month - 1, day, hour, minute, second || 0)));
            const utcDate = new Date(Date.UTC(year, month - 1, day, hour, minute, second || 0) - baseOffset * 60 * 60 * 1000);

            const t = translations[currentLang];
            const utcStr = utcDate.getUTCHours().toString().padStart(2, '0') + ':' + utcDate.getUTCMinutes().toString().padStart(2, '0');
            document.getElementById('utcValue').textContent = utcStr;

            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            document.querySelectorAll('.tz-card').forEach((card, i) => {
                const tzSelect = card.querySelector('.tz-select');
                const locId = tzSelect.value;
                const loc = allLocations.find(l => l.id === locId);
                if (!loc) return;
                const tzOffset = getTimezoneOffset(loc.tz, utcDate);
                const localDate = new Date(utcDate.getTime() + tzOffset * 60 * 60 * 1000);
                // Use UTC methods to avoid local timezone interference
                card.querySelector('[data-time="' + i + '"]').textContent =
                    localDate.getUTCHours().toString().padStart(2, '0') + ':' +
                    localDate.getUTCMinutes().toString().padStart(2, '0');
                card.querySelector('[data-date="' + i + '"]').textContent =
                    (localDate.getUTCMonth() + 1) + '/' + localDate.getUTCDate();
                card.querySelector('[data-day="' + i + '"]').textContent = days[localDate.getUTCDay()];
                card.querySelector('[data-offset="' + i + '"]').textContent = formatTimezoneOffset(tzOffset);
            });
        }

        function updateTimezoneCards() {
            const selects = document.querySelectorAll('.tz-select');
            selects.forEach(select => {
                const currentVal = select.value;
                select.innerHTML = '';
                allLocations.forEach(loc => {
                    const opt = document.createElement('option');
                    opt.value = loc.id;
                    opt.textContent = locationNames[currentLang][loc.id] || loc.id;
                    select.appendChild(opt);
                });
                select.value = currentVal;
            });
        }

        function updateDays() {
            const year = parseInt(document.getElementById('year').value);
            const month = parseInt(document.getElementById('month').value);
            const daySelect = document.getElementById('day');
            const currentDay = daySelect.value;
            daySelect.innerHTML = '';
            const days = new Date(year, month, 0).getDate();
            for (let d = 1; d <= days; d++) {
                daySelect.add(new Option(d.toString().padStart(2, '0'), d));
            }
            if (currentDay && parseInt(currentDay) <= days) {
                daySelect.value = currentDay;
            } else {
                daySelect.value = days;
            }
        }

        function init() {
            applyTheme(getAutoTheme());
            updateThemeIcon();

            const now = new Date();
            const yearSelect = document.getElementById('year');
            for (let y = now.getFullYear() - 1; y <= now.getFullYear() + 2; y++) {
                yearSelect.add(new Option(y, y));
            }
            yearSelect.value = now.getFullYear();

            const monthSelect = document.getElementById('month');
            for (let m = 1; m <= 12; m++) {
                monthSelect.add(new Option(m.toString().padStart(2, '0'), m));
            }
            monthSelect.value = now.getMonth() + 1;
            updateDays();

            const hourSelect = document.getElementById('hour');
            for (let h = 0; h < 24; h++) {
                hourSelect.add(new Option(h.toString().padStart(2, '0'), h));
            }
            hourSelect.value = now.getHours();

            const minuteSelect = document.getElementById('minute');
            [0, 15, 30, 45].forEach(m => {
                minuteSelect.add(new Option(m.toString().padStart(2, '0'), m));
            });
            minuteSelect.value = Math.floor(now.getMinutes() / 15) * 15;

            const secondSelect = document.getElementById('second');
            for (let s = 0; s < 60; s += 5) {
                secondSelect.add(new Option(s.toString().padStart(2, '0'), s));
            }
            secondSelect.value = Math.floor(now.getSeconds() / 5) * 5;

            initBaseTimezoneSelector();
            initTimezoneCards();

            yearSelect.addEventListener('change', updateAll);
            monthSelect.addEventListener('change', updateDays);
            document.getElementById('day').addEventListener('change', updateAll);
            document.getElementById('hour').addEventListener('change', updateAll);
            document.getElementById('minute').addEventListener('change', updateAll);
            document.getElementById('second').addEventListener('change', updateAll);
            document.getElementById('baseTimezone').addEventListener('change', updateAll);
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });

            setLanguage(currentLang);
            updateAll();

            if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
                document.getElementById('installHint').style.display = 'block';
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
        }

        init();
    </script>
