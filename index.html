<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e14">
    <title>🤝 MEETING SYNC — Timezone Coordinator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #0d1219;
            --bg-card: #111921;
            --bg-input: #0a0e14;
            --bg-elevated: #151d27;
            --cyan-glow: #00e5ff;
            --cyan-dim: #007a8a;
            --cyan-muted: #004a55;
            --amber-glow: #ffab00;
            --amber-dim: #8a5a00;
            --amber-soft: #cc8800;
            --green-glow: #00ff9d;
            --green-dim: #008a55;
            --text-primary: #e0e6ed;
            --text-secondary: #6b7c8f;
            --text-dim: #3d4a5c;
            --border-color: #1e2a38;
            --border-glow: rgba(0, 229, 255, 0.3);
            --scanline-opacity: 0.03;
            --grid-opacity: 0.02;
            --transition-duration: 0.6s;
        }

        :root.day-mode {
            --bg-primary: #faf6f0;
            --bg-secondary: #f5efe6;
            --bg-card: #ffffff;
            --bg-input: #f0ebe3;
            --bg-elevated: #fffcf7;
            --cyan-glow: #d4600a;
            --cyan-dim: #a84808;
            --cyan-muted: #d4a088;
            --amber-glow: #c45c00;
            --amber-dim: #8a5a00;
            --amber-soft: #e07010;
            --green-glow: #1a8a4a;
            --green-dim: #2a6a4a;
            --text-primary: #1a1a2e;
            --text-secondary: #5a5a6e;
            --text-dim: #9a9aae;
            --border-color: #e0d8cc;
            --border-glow: rgba(196, 92, 0, 0.2);
            --scanline-opacity: 0;
            --grid-opacity: 0.03;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow-x: hidden; }

        body {
            font-family: 'Space Mono', 'Courier New', monospace;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-user-select: none;
            user-select: none;
            position: relative;
            transition: background var(--transition-duration), color var(--transition-duration);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,var(--scanline-opacity)) 2px, rgba(0,0,0,var(--scanline-opacity)) 4px);
            pointer-events: none;
            z-index: 1000;
            transition: opacity var(--transition-duration);
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(0,229,255,var(--grid-opacity)) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,var(--grid-opacity)) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
            transition: opacity var(--transition-duration);
        }

        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: background var(--transition-duration), border-color var(--transition-duration);
        }

        .lang-switcher {
            display: flex;
            gap: 4px;
            background: var(--bg-input);
            padding: 4px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .lang-btn {
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Space Mono', monospace;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .lang-btn:hover { color: var(--text-primary); }

        .lang-btn.active {
            background: var(--cyan-glow);
            color: var(--bg-primary);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
        }

        :root.day-mode .lang-btn.active { box-shadow: 0 2px 8px rgba(196, 92, 0, 0.3); }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .theme-toggle:hover { border-color: var(--cyan-glow); }

        .theme-icon { width: 18px; height: 18px; transition: transform 0.3s; }
        .theme-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-secondary); }

        .container { max-width: 540px; margin: 0 auto; padding: 8px; position: relative; z-index: 1; }

        .header { text-align: center; padding: 12px 0 14px; position: relative; }

        .header-icon {
            font-size: 28px;
            margin-bottom: 6px;
            display: block;
            filter: drop-shadow(0 0 20px var(--amber-glow));
            transition: filter var(--transition-duration);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-primary);
            margin-bottom: 4px;
            transition: color var(--transition-duration);
        }

        .header .subtitle {
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--text-dim);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--green-glow);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 8px var(--green-glow);
            transition: background var(--transition-duration), box-shadow var(--transition-duration);
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            transition: all var(--transition-duration);
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }

        :root.day-mode .panel { box-shadow: 0 2px 16px rgba(0,0,0,0.06); }

        .panel-header {
            background: var(--bg-elevated);
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background var(--transition-duration), border-color var(--transition-duration);
        }

        .panel-header .indicator {
            width: 10px;
            height: 10px;
            background: var(--cyan-glow);
            border-radius: 3px;
            box-shadow: 0 0 12px var(--cyan-glow);
            transition: background var(--transition-duration), box-shadow var(--transition-duration);
        }

        .panel-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--cyan-glow);
            transition: color var(--transition-duration);
        }

        .panel-content { padding: 10px; }

        .time-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .selector-group { display: flex; flex-direction: column; gap: 3px; }
        .selector-group.full-width { grid-column: span 3; }

        .selector-group label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-dim);
            padding-left: 4px;
            transition: color var(--transition-duration);
        }

        select {
            padding: 8px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            text-align: center;
            transition: all 0.2s;
        }

        select:focus { outline: none; border-color: var(--cyan-glow); box-shadow: 0 0 0 3px rgba(0,229,255,0.15); }
        :root.day-mode select:focus { box-shadow: 0 0 0 3px rgba(196,92,0,0.15); }
        select option { background: var(--bg-card); color: var(--text-primary); }

        .preset-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--bg-elevated), var(--bg-card));
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--cyan-glow);
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .preset-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,229,255,0.08), transparent);
            transition: left 0.5s;
        }

        .preset-btn:hover { border-color: var(--cyan-glow); box-shadow: 0 0 20px rgba(0,229,255,0.15); }
        .preset-btn:hover::before { left: 100%; }
        :root.day-mode .preset-btn:hover { border-color: var(--amber-glow); box-shadow: 0 2px 16px rgba(196,92,0,0.2); }

        .timezone-cards { display: flex; flex-direction: column; gap: 6px; }

        .tz-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .tz-card:hover { border-color: var(--cyan-muted); transform: translateX(4px); }
        :root.day-mode .tz-card:hover { border-color: var(--amber-soft); transform: translateX(2px); box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

        .tz-card-top {
            display: flex;
            align-items: stretch;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            transition: background var(--transition-duration), border-color var(--transition-duration);
        }

        .tz-number {
            width: 32px;
            min-width: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(0,229,255,0.12), rgba(0,229,255,0.04));
            border-right: 1px solid var(--border-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 900;
            color: var(--cyan-glow);
            text-shadow: 0 0 8px var(--cyan-glow);
            transition: all var(--transition-duration);
        }

        :root.day-mode .tz-number {
            background: linear-gradient(180deg, rgba(196,92,0,0.1), rgba(196,92,0,0.04));
            color: var(--amber-glow);
            text-shadow: none;
        }

        .tz-selector { flex: 1; padding: 6px 8px; display: flex; align-items: center; }

        .tz-selector select {
            width: 100%;
            padding: 4px 6px;
            font-size: 11px;
            background: transparent;
            border: none;
            border-bottom: 1px solid transparent;
            border-radius: 0;
            text-align: left;
            transition: border-color 0.2s;
        }

        .tz-selector select:focus { border-bottom-color: var(--cyan-glow); box-shadow: none; }

        .tz-offset {
            padding: 6px 10px;
            font-size: 9px;
            font-weight: 700;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            letter-spacing: 1px;
            border-left: 1px solid var(--border-color);
            transition: color var(--transition-duration), border-color var(--transition-duration);
        }

        .tz-card-bottom {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: linear-gradient(180deg, var(--bg-card), var(--bg-elevated));
            transition: background var(--transition-duration);
        }

        .time-display { flex: 1; display: flex; align-items: baseline; gap: 6px; }

        .time-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: var(--amber-glow);
            text-shadow: 0 0 12px var(--amber-glow), 0 0 24px rgba(255,171,0,0.3);
            letter-spacing: 2px;
            transition: color var(--transition-duration), text-shadow var(--transition-duration);
        }

        :root.day-mode .time-main { color: var(--amber-soft); text-shadow: none; }

        .time-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .time-date { font-size: 11px; font-weight: 700; color: var(--text-primary); transition: color var(--transition-duration); }
        .time-day { font-size: 10px; font-weight: 700; color: var(--green-glow); letter-spacing: 1px; transition: color var(--transition-duration); }

        .status-bar {
            margin-top: 12px;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all var(--transition-duration);
        }

        .status-item { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); transition: color var(--transition-duration); }
        .status-item span { color: var(--green-glow); font-weight: 700; transition: color var(--transition-duration); }

        .footer {
            margin-top: 16px;
            padding: 16px 0;
            text-align: center;
            border-top: 1px solid var(--border-color);
            transition: border-color var(--transition-duration);
        }

        .footer-brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
        .footer-logo { width: 32px; height: 32px; }
        .footer-text { font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--text-secondary); transition: color var(--transition-duration); }
        .footer-tagline { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }

        .install-hint {
            text-align: center;
            font-size: 9px;
            color: var(--text-dim);
            margin-top: 16px;
            padding: 12px;
            background: rgba(0,229,255,0.03);
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            letter-spacing: 1px;
            transition: all var(--transition-duration);
        }

        @media (max-width: 400px) {
            .time-main { font-size: 18px; }
            .tz-number { width: 28px; min-width: 28px; font-size: 11px; }
            .header h1 { font-size: 12px; letter-spacing: 3px; }
            .header-icon { font-size: 22px; }
            .time-selector { grid-template-columns: repeat(3, 1fr); }
            .selector-group.full-width { grid-column: span 3; }
        }

        @media (min-width: 500px) {
            .container { padding: 16px; }
            .header h1 { font-size: 16px; letter-spacing: 5px; }
            .time-main { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="zh">中文</button>
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="pt">PT</button>
        </div>
        <div class="theme-toggle" id="themeToggle">
            <svg class="theme-icon" id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <span class="theme-label" id="themeLabel">AUTO</span>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <span class="header-icon">🤝</span>
            <h1 id="headerTitle">Meeting Sync</h1>
            <div class="subtitle">
                <span id="headerSubtitle">Timezone Coordinator</span>
                <span class="status-dot"></span>
            </div>
        </header>
        
        <div class="panel">
            <div class="panel-header">
                <div class="indicator"></div>
                <h2 id="panelBaseTime">Base Time</h2>
            </div>
            <div class="panel-content">
                <div class="time-selector">
                    <div class="selector-group"><label id="lblYear">Year</label><select id="year"></select></div>
                    <div class="selector-group"><label id="lblMonth">Month</label><select id="month"></select></div>
                    <div class="selector-group"><label id="lblDay">Day</label><select id="day"></select></div>
                    <div class="selector-group"><label id="lblHour">Hour</label><select id="hour"></select></div>
                    <div class="selector-group"><label id="lblMinute">Min</label><select id="minute"></select></div>
                    <div class="selector-group full-width"><label id="lblTimezone">Timezone</label><select id="baseTimezone"></select></div>
                </div>
                <button class="preset-btn" id="presetBtn" onclick="loadPresets()">Load Preset Routes</button>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-header">
                <div class="indicator"></div>
                <h2 id="panelDestTime">Destination Times</h2>
            </div>
            <div class="panel-content">
                <div class="timezone-cards" id="timeZones"></div>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="status-item" id="statusSystem">System: <span>Online</span></div>
            <div class="status-item" id="utcDisplay">UTC: <span>--:--</span></div>
        </div>

        <footer class="footer">
            <div class="footer-brand">
                <svg class="footer-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="1" width="30" height="30" rx="6" fill="var(--bg-input)" stroke="var(--border-color)" stroke-width="1.5"/>
                    <path d="M8 24L24 8" stroke="var(--cyan-glow)" stroke-width="3" stroke-linecap="round"/>
                    <path d="M8 24L24 8" stroke="var(--amber-glow)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                    <path d="M10 10V22M10 10H18C20.2 10 22 11.8 22 14C22 16.2 20.2 18 18 18H10" stroke="var(--text-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="24" cy="24" r="2" fill="var(--green-glow)"/>
                    <circle cx="8" cy="8" r="1.5" fill="var(--cyan-glow)" opacity="0.7"/>
                </svg>
                <span class="footer-text">by SlashBro</span>
            </div>
            <div class="footer-tagline" id="footerTagline">Precision Time Coordination</div>
        </footer>
        
        <div class="install-hint" id="installHint" style="display:none">↑ Safari Share → Add to Home Screen</div>
    </div>

                'America/Monterrey': 'México · Monterrey',
                'America/Sao_Paulo': 'Brasil · São Paulo',
                'Europe/Madrid': 'España · Madrid',
                'Europe/London': 'Reino Unido · Cardiff'
            },
            pt: {
                'Asia/Shanghai': 'China · Pequim',
                'America/Los_Angeles': 'EUA · Los Angeles',
                'America/Chicago_Houston': 'EUA · Houston',
                'America/Chicago_Rockford': 'EUA · Rockford',
                'America/Monterrey': 'México · Monterrey',
                'America/Sao_Paulo': 'Brasil · São Paulo',
                'Europe/Madrid': 'Espanha · Madri',
                'Europe/London': 'Reino Unido · Cardiff'
            }
        };

        const allLocations = [
            { id: 'Asia/Shanghai', tz: 'Asia/Shanghai' },
            { id: 'America/Los_Angeles', tz: 'America/Los_Angeles' },
            { id: 'America/Chicago_Houston', tz: 'America/Chicago' },
            { id: 'America/Chicago_Rockford', tz: 'America/Chicago' },
            { id: 'America/Monterrey', tz: 'America/Monterrey' },
            { id: 'America/Sao_Paulo', tz: 'America/Sao_Paulo' },
            { id: 'Europe/Madrid', tz: 'Europe/Madrid' },
            { id: 'Europe/London', tz: 'Europe/London' }
        ];

        const defaultDestinations = [
            'Asia/Shanghai',
            'America/Los_Angeles',
            'America/Chicago_Houston',
            'America/Chicago_Rockford',
            'America/Monterrey',
            'Europe/Madrid',
            'Europe/London',
            'America/Sao_Paulo'
        ];

        let currentLang = 'zh';
        let manualTheme = null;

        function getAutoTheme() {
            const hour = new Date().getHours();
            return (hour >= 6 && hour < 18) ? 'day' : 'night';
        }

        function applyTheme(theme) {
            if (theme === 'day') {
                document.documentElement.classList.add('day-mode');
            } else {
                document.documentElement.classList.remove('day-mode');
            }
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const theme = manualTheme || getAutoTheme();
            if (theme === 'day') {
                icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
                label.textContent = 'DAY';
            } else {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
                label.textContent = 'NIGHT';
            }
        }

        function toggleTheme() {
            const currentTheme = manualTheme || getAutoTheme();
            manualTheme = currentTheme === 'night' ? 'day' : 'night';
            applyTheme(manualTheme);
            updateThemeIcon();
        }

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('headerTitle').textContent = t.headerTitle;
            document.getElementById('headerSubtitle').textContent = t.headerSubtitle;
            document.getElementById('panelBaseTime').textContent = t.panelBaseTime;
            document.getElementById('panelDestTime').textContent = t.panelDestTime;
            document.getElementById('lblYear').textContent = t.lblYear;
            document.getElementById('lblMonth').textContent = t.lblMonth;
            document.getElementById('lblDay').textContent = t.lblDay;
            document.getElementById('lblHour').textContent = t.lblHour;
            document.getElementById('lblMinute').textContent = t.lblMinute;
            document.getElementById('lblTimezone').textContent = t.lblTimezone;
            document.getElementById('presetBtn').textContent = t.presetBtn;
            document.getElementById('statusSystem').innerHTML = t.statusSystem + ': <span>' + t.online + '</span>';
            document.getElementById('utcDisplay').innerHTML = t.utc + ': <span>--:--</span>';
            document.getElementById('footerTagline').textContent = t.footerTagline;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
            updateTimezoneCards();
        }

        function getTimezoneOffset(date, timezone) {
            const utcDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
            const tzDate = new Date(date.toLocaleString('en-US', { timeZone: timezone }));
            return (tzDate - utcDate) / (60 * 60 * 1000);
        }

        function formatTimezoneOffset(offset) {
            const sign = offset >= 0 ? '+' : '';
            return 'UTC' + sign + offset;
        }

        function init() {
            applyTheme(getAutoTheme());
            updateThemeIcon();

            const now = new Date();
            const yearSelect = document.getElementById('year');
            for (let y = now.getFullYear() - 1; y <= now.getFullYear() + 2; y++) {
                yearSelect.add(new Option(y, y));
            }
            yearSelect.value = now.getFullYear();

            const monthSelect = document.getElementById('month');
            for (let m = 1; m <= 12; m++) {
                monthSelect.add(new Option(m.toString().padStart(2, '0'), m));
            }
            monthSelect.value = now.getMonth() + 1;

            updateDays();

            const hourSelect = document.getElementById('hour');
            for (let h = 0; h < 24; h++) {
                hourSelect.add(new Option(h.toString().padStart(2, '0'), h));
            }
            hourSelect.value = now.getHours();

            const minuteSelect = document.getElementById('minute');
            [0, 15, 30, 45].forEach(m => {
                minuteSelect.add(new Option(m.toString().padStart(2, '0'), m));
            });
            minuteSelect.value = Math.floor(now.getMinutes() / 15) * 15;

            const tzSelect = document.getElementById('baseTimezone');
            allLocations.forEach(loc => {
                const opt = document.createElement('option');
                opt.value = loc.tz;
                opt.textContent = locationNames[currentLang][loc.id] || loc.id;
                tzSelect.appendChild(opt);
            });
            tzSelect.value = 'Asia/Shanghai';

            initTimezoneCards();

            yearSelect.addEventListener('change', updateAll);
            monthSelect.addEventListener('change', updateDays);
            document.getElementById('day').addEventListener('change', updateAll);
            document.getElementById('hour').addEventListener('change', updateAll);
            document.getElementById('minute').addEventListener('change', updateAll);
            document.getElementById('baseTimezone').addEventListener('change', updateAll);
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });

            updateAll();
            setLanguage(currentLang);

            if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
                document.getElementById('installHint').style.display = 'block';
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
        }

        function updateDays() {
            const year = parseInt(document.getElementById('year').value);
            const month = parseInt(document.getElementById('month').value);
            const daySelect = document.getElementById('day');
            const currentDay = daySelect.value;
            daySelect.innerHTML = '';
            const days = new Date(year, month, 0).getDate();
            for (let d = 1; d <= days; d++) {
                daySelect.add(new Option(d.toString().padStart(2, '0'), d));
            }
            if (currentDay && parseInt(currentDay) <= days) {
                daySelect.value = currentDay;
            } else {
                daySelect.value = days;
            }
        }

        function initTimezoneCards() {
            const container = document.getElementById('timeZones');
            container.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const card = document.createElement('div');
                card.className = 'tz-card';
                card.innerHTML = '<div class="tz-card-top"><div class="tz-number">' + String(i + 1).padStart(2, '0') + '</div><div class="tz-selector"><select class="tz-select" data-index="' + i + '"></select></div><div class="tz-offset" data-offset="' + i + '">--</div></div><div class="tz-card-bottom"><div class="time-display"><span class="time-main" data-time="' + i + '">--:--</span></div><div class="time-meta"><span class="time-date" data-date="' + i + '">--/--</span><span class="time-day" data-day="' + i + '">---</span></div></div>';
                container.appendChild(card);
            }
            const selects = container.querySelectorAll('.tz-select');
            allLocations.forEach((loc, idx) => {
                selects.forEach(select => {
                    const opt = document.createElement('option');
                    opt.value = loc.id;
                    opt.textContent = locationNames[currentLang][loc.id] || loc.id;
                    select.appendChild(opt.cloneNode(true));
                });
            });
            selects.forEach(select => select.addEventListener('change', updateAll));
            loadPresets();
        }

        function loadPresets() {
            document.querySelectorAll('.tz-select').forEach((select, i) => {
                if (defaultDestinations[i]) {
                    select.value = defaultDestinations[i];
                }
            });
            updateAll();
        }

        function updateAll() {
            const year = parseInt(document.getElementById('year').value);
            const month = parseInt(document.getElementById('month').value);
            const day = parseInt(document.getElementById('day').value);
            const hour = parseInt(document.getElementById('hour').value);
            const minute = parseInt(document.getElementById('minute').value);
            const baseTz = document.getElementById('baseTimezone').value;

            const userDate = new Date(Date.UTC(year, month - 1, day, hour, minute, 0));
            const baseOffset = getTimezoneOffset(userDate, baseTz);
            const utcDate = new Date(userDate.getTime() - baseOffset * 60 * 60 * 1000);

            const t = translations[currentLang];
            const utcStr = utcDate.getUTCHours().toString().padStart(2, '0') + ':' + utcDate.getUTCMinutes().toString().padStart(2, '0');
            document.querySelector('#utcDisplay span').textContent = utcStr;

            document.querySelectorAll('.tz-card').forEach((card, i) => {
                const tzSelect = card.querySelector('.tz-select');
                const locId = tzSelect.value;
                const loc = allLocations.find(l => l.id === locId);
                if (!loc) return;
                const tzOffset = getTimezoneOffset(utcDate, loc.tz);
                const localDate = new Date(utcDate.getTime() + tzOffset * 60 * 60 * 1000);
                const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
                card.querySelector('[data-time="' + i + '"]').textContent = localDate.getHours().toString().padStart(2, '0') + ':' + localDate.getMinutes().toString().padStart(2, '0');
                card.querySelector('[data-date="' + i + '"]').textContent = (localDate.getMonth() + 1) + '/' + localDate.getDate();
                card.querySelector('[data-day="' + i + '"]').textContent = days[localDate.getDay()];
                card.querySelector('[data-offset="' + i + '"]').textContent = formatTimezoneOffset(tzOffset);
            });
        }

        function updateTimezoneCards() {
            const selects = document.querySelectorAll('.tz-select');
            selects.forEach(select => {
                const currentVal = select.value;
                select.innerHTML = '';
                allLocations.forEach(loc => {
                    const opt = document.createElement('option');
                    opt.value = loc.id;
                    opt.textContent = locationNames[currentLang][loc.id] || loc.id;
                    select.appendChild(opt);
                });
                select.value = currentVal;
            });
        }

        init();
    </script>
</body>
</html>
